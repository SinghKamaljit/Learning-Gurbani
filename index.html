<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gurbani Katha Practice</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1b2a">
<style>
  :root{--navy:#0d1b2a;--navy2:#152336;--gold:#c9a84c;--gold2:#e8c96a;--cream:#f5f0e8;--cream2:#ede6d6;--muted:#6b7280;--red:#9b2226;--r:18px;--rs:10px}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--navy);min-height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--cream);padding-bottom:40px}
  .hdr{background:linear-gradient(135deg,var(--navy2),#1a2d45);border-bottom:1px solid rgba(201,168,76,.25);padding:16px 20px 12px;text-align:center;position:sticky;top:0;z-index:100}
  .hdr h1{font-size:1.2rem;font-weight:700;letter-spacing:.05em;color:var(--gold2);text-transform:uppercase}
  .hdr p{font-size:.72rem;color:rgba(245,240,232,.5);margin-top:2px;letter-spacing:.08em}
  .main{padding:16px;max-width:520px;margin:0 auto}
  .card{background:var(--navy2);border:1px solid rgba(201,168,76,.15);border-radius:var(--r);padding:16px;margin-bottom:14px}
  .ct{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .ct::after{content:'';flex:1;height:1px;background:rgba(201,168,76,.2)}
  /* Reference slot (image OR text, scrollable) */
  .ref-toggle{display:flex;gap:8px;margin-bottom:10px}
  .ref-toggle button{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:var(--rs);color:var(--muted);font-size:.78rem;padding:8px;font-weight:600}
  .ref-toggle button.on{background:rgba(201,168,76,.15);color:var(--gold2);border-color:var(--gold)}
  .ref-box{max-height:320px;overflow-y:auto;border-radius:var(--rs);background:rgba(0,0,0,.2);border:1px solid rgba(201,168,76,.1)}
  .ref-box img{width:100%;display:block}
  .ref-box textarea{width:100%;min-height:280px;background:transparent;border:none;color:var(--cream2);font-size:.95rem;line-height:1.7;padding:14px;outline:none;resize:vertical;font-family:inherit}
  .ref-hint{font-size:.7rem;color:var(--muted);margin-top:6px;text-align:center}
  /* Video */
  .vwrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--rs);overflow:hidden}
  video{width:100%;height:100%;object-fit:contain}
  .miss{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.8rem;text-align:center;padding:20px}
  /* Tutor audio */
  .aud-row{display:flex;align-items:center;gap:12px}
  .pbtn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:50%;width:46px;height:46px;color:var(--gold);font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .pbtn:active{background:rgba(201,168,76,.22)}
  .aud-time{font-size:.78rem;color:var(--muted);flex:1;text-align:center;font-variant-numeric:tabular-nums}
  /* Recorder */
  .rec-status{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .dot.live{background:var(--red);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .rec-timer{font-size:1.6rem;font-weight:700;color:var(--gold2);font-variant-numeric:tabular-nums;text-align:center;margin-bottom:14px}
  .rec-btn{width:100%;border:none;border-radius:var(--r);font-size:1rem;font-weight:800;padding:16px;letter-spacing:.04em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px}
  .rec-btn.start{background:linear-gradient(135deg,var(--gold),#b8922a);color:var(--navy);box-shadow:0 4px 16px rgba(201,168,76,.25)}
  .rec-btn.stop{background:linear-gradient(135deg,#c0392b,var(--red));color:#fff;box-shadow:0 4px 16px rgba(155,34,38,.3)}
  .rec-btn:active{transform:scale(.97)}
  .hist{margin-top:14px}
  .hitem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border:1px solid rgba(201,168,76,.1);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px}
  .hitem .hi-name{flex:1;font-size:.8rem;color:var(--cream2)}
  .hitem .hi-btn{background:none;border:none;color:var(--gold);font-size:1rem;padding:4px 8px}
  .hitem .hi-btn.del{color:#f4978e}
  .empty{font-size:.78rem;color:var(--muted);text-align:center;padding:14px}
  .wake-note{font-size:.7rem;color:var(--muted);text-align:center;margin-top:10px}
</style>
</head>
<body>

<div class="hdr">
  <h1 id="appTitle">Gurbani Katha Practice</h1>
  <p>Watch · Listen · Recite</p>
</div>

<div class="main">

  <!-- Reference: image or pasted text, combined scrollable slot -->
  <div class="card">
    <div class="ct">Reference</div>
    <div class="ref-toggle">
      <button id="refImgBtn" class="on">🖼️ Image</button>
      <button id="refTxtBtn">📝 Text</button>
    </div>
    <div class="ref-box" id="refImgBox">
      <img src="1.jpg" id="refImg" alt="Shabad" onerror="this.parentElement.innerHTML='<div class=miss>No 1.jpg found in app folder</div>'">
    </div>
    <div class="ref-box" id="refTxtBox" style="display:none">
      <textarea id="refTxt" placeholder="Paste shabad text here…"></textarea>
    </div>
    <div class="ref-hint">Scroll within the box · text autosaves on this device</div>
  </div>

  <!-- Katha video -->
  <div class="card">
    <div class="ct">Katha Video</div>
    <div class="vwrap">
      <video id="kVideo" controls playsinline webkit-playsinline preload="metadata" src="1.mp4">
        <div class="miss">No 1.mp4 found in app folder</div>
      </video>
    </div>
  </div>

  <!-- Tutor audio -->
  <div class="card">
    <div class="ct">Tutor Voice</div>
    <div class="aud-row">
      <button class="pbtn" id="tutorPlay">▶</button>
      <div class="aud-time" id="tutorTime">0:00 / 0:00</div>
    </div>
    <audio id="tutorAudio" src="1.m4a" preload="metadata"></audio>
  </div>

  <!-- XL Recording -->
  <div class="card">
    <div class="ct">Your Practice (XL Recording)</div>
    <div class="rec-status"><span class="dot" id="recDot"></span><span id="recLabel" style="font-size:.78rem;color:var(--muted)">Ready</span></div>
    <div class="rec-timer" id="recTimer">0:00</div>
    <button class="rec-btn start" id="recBtn">🎙️ Start Recording</button>
    <div class="wake-note">Keeps screen awake while recording</div>
    <div class="hist" id="histList"></div>
  </div>

</div>

<script>
// ─── Identity / prefix ───
const P = 'Gur_';

// ─── Reference toggle (image / text) ───
const refImgBtn=document.getElementById('refImgBtn'), refTxtBtn=document.getElementById('refTxtBtn');
const refImgBox=document.getElementById('refImgBox'), refTxtBox=document.getElementById('refTxtBox');
const refTxt=document.getElementById('refTxt');

function setRefMode(mode){
  localStorage.setItem(P+'refMode',mode);
  refImgBtn.classList.toggle('on',mode==='img');
  refTxtBtn.classList.toggle('on',mode==='txt');
  refImgBox.style.display = mode==='img' ? 'block':'none';
  refTxtBox.style.display = mode==='txt' ? 'block':'none';
}
refImgBtn.addEventListener('click',()=>setRefMode('img'));
refTxtBtn.addEventListener('click',()=>setRefMode('txt'));
setRefMode(localStorage.getItem(P+'refMode')||'img');

refTxt.value = localStorage.getItem(P+'shabadText') || '';
refTxt.addEventListener('input',()=>localStorage.setItem(P+'shabadText',refTxt.value));

// ─── Tutor audio ───
const tutorAudio=document.getElementById('tutorAudio'), tutorPlay=document.getElementById('tutorPlay'), tutorTime=document.getElementById('tutorTime');
function mmss(s){s=Math.max(0,Math.floor(s||0));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
tutorPlay.addEventListener('click',()=>{ tutorAudio.paused ? tutorAudio.play() : tutorAudio.pause(); });
tutorAudio.addEventListener('play',()=>tutorPlay.textContent='⏸');
tutorAudio.addEventListener('pause',()=>tutorPlay.textContent='▶');
tutorAudio.addEventListener('timeupdate',()=>{ tutorTime.textContent=mmss(tutorAudio.currentTime)+' / '+mmss(tutorAudio.duration); });
tutorAudio.addEventListener('loadedmetadata',()=>{ tutorTime.textContent='0:00 / '+mmss(tutorAudio.duration); });

// ─── IndexedDB for XL recordings ───
let db;
const dbReq = indexedDB.open(P+'db', 1);
dbReq.onupgradeneeded = e => {
  const d = e.target.result;
  if(!d.objectStoreNames.contains('recordings')) d.createObjectStore('recordings',{keyPath:'id'});
};
dbReq.onsuccess = e => { db = e.target.result; loadHistory(); };

function idbPut(rec){ return new Promise((res,rej)=>{ const tx=db.transaction('recordings','readwrite'); tx.objectStore('recordings').put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
function idbGetAll(){ return new Promise((res,rej)=>{ const tx=db.transaction('recordings','readonly'); const r=tx.objectStore('recordings').getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function idbDelete(id){ return new Promise((res,rej)=>{ const tx=db.transaction('recordings','readwrite'); tx.objectStore('recordings').delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }

// ─── Recorder (XL, chunk-streamed to IndexedDB-safe blob assembly) ───
const recBtn=document.getElementById('recBtn'), recDot=document.getElementById('recDot'), recLabel=document.getElementById('recLabel'), recTimer=document.getElementById('recTimer');
let mediaRecorder=null, recChunks=[], recStart=0, recInterval=null, wakeLock=null, isRecording=false;

async function acquireWakeLock(){ try{ wakeLock = await navigator.wakeLock.request('screen'); }catch(e){} }
function releaseWakeLock(){ if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; } }

recBtn.addEventListener('click', async ()=>{
  if(!isRecording){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:{
        echoCancellation:false, noiseSuppression:false, autoGainControl:false
      }});
      const mime = ['audio/mp4','audio/webm;codecs=opus','audio/webm'].find(m=>MediaRecorder.isTypeSupported(m)) || '';
      mediaRecorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
      recChunks = [];
      mediaRecorder.ondataavailable = e => { if(e.data && e.data.size>0) recChunks.push(e.data); };
      mediaRecorder.onstop = async ()=>{
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(recChunks, {type: mediaRecorder.mimeType || 'audio/webm'});
        const id = Date.now().toString();
        await idbPut({id, blob, name:'Practice '+new Date(parseInt(id)).toLocaleString(), duration: Math.floor((Date.now()-recStart)/1000)});
        await loadHistory();
      };
      mediaRecorder.start(1000); // 1s chunks, streamed into memory array (XL-safe)
      isRecording = true;
      recStart = Date.now();
      recBtn.textContent = '⏹ Stop Recording';
      recBtn.classList.remove('start'); recBtn.classList.add('stop');
      recDot.classList.add('live'); recLabel.textContent='Recording…';
      acquireWakeLock();
      recInterval = setInterval(()=>{ recTimer.textContent = mmss((Date.now()-recStart)/1000); }, 500);
    }catch(err){
      alert('Microphone access failed: '+err.message);
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(recInterval);
    recBtn.textContent = '🎙️ Start Recording';
    recBtn.classList.remove('stop'); recBtn.classList.add('start');
    recDot.classList.remove('live'); recLabel.textContent='Ready';
    recTimer.textContent='0:00';
    releaseWakeLock();
  }
});

async function loadHistory(){
  const list = document.getElementById('histList');
  if(!db){ return; }
  const recs = (await idbGetAll()).sort((a,b)=>b.id-a.id);
  if(recs.length===0){ list.innerHTML = '<div class="empty">No practice recordings yet</div>'; return; }
  list.innerHTML = '';
  recs.forEach(rec=>{
    const url = URL.createObjectURL(rec.blob);
    const div = document.createElement('div');
    div.className='hitem';
    div.innerHTML = `
      <button class="hi-btn" data-play="${rec.id}">▶</button>
      <span class="hi-name">${rec.name} · ${mmss(rec.duration)}</span>
      <button class="hi-btn" data-dl="${rec.id}">⬇</button>
      <button class="hi-btn del" data-del="${rec.id}">✕</button>
    `;
    div.querySelector('[data-play]').addEventListener('click',()=>{ const a=new Audio(url); a.play(); });
    div.querySelector('[data-dl]').addEventListener('click',()=>{
      const a=document.createElement('a'); a.href=url; a.download=rec.name.replace(/[:\/ ,]/g,'_')+'.webm'; a.click();
    });
    div.querySelector('[data-del]').addEventListener('click', async ()=>{ await idbDelete(rec.id); loadHistory(); });
    list.appendChild(div);
  });
}

// ─── Service worker registration ───
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
